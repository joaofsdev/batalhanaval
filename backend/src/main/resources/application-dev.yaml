spring:
  application:
    name: batalhanaval-api
  datasource:
    url: jdbc:h2:file:./batalhanavaldbdev;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

jwt:
  secret: dev-secret-key-min-256-bits-long-enough-for-hmac-sha256
  expiration: 86400000

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173

rate-limit:
  auth:
    requests-per-minute: 10

game:
  afk:
    max-consecutive-skips: 3
