spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-min-256-bits-long-enough-for-hmac-sha256-test
  expiration: 86400000

cors:
  allowed-origins: http://localhost:3000
